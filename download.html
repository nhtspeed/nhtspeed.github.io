<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>NHT</title>
<style>
body{margin:0;font-family:system-ui;background:#0b0b0b;color:#fff}
.header{padding:16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.logo-wrap{width:95px;height:95px;border-radius:50%;overflow:hidden;position:relative;background:#111}
.logo{width:100%;height:100%;object-fit:cover;opacity:0;transition:.4s}
.logo.loaded{opacity:1}
.logo-wrap:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.2),transparent);animation:x 1.2s infinite}
@keyframes x{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.top-name{font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px}
.verify-badge{width:18px;height:18px;border-radius:50%;background:#1da1f2;display:flex;align-items:center;justify-content:center;animation:p 1.5s infinite;box-shadow:0 0 10px rgba(29,161,242,.6);text-decoration:none}
.verify-badge svg{width:12px;height:12px;fill:#fff}
@keyframes p{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
#info{margin-top:2px;font-size:13px;font-weight:800;padding:6px 10px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15)}
#info span{background:linear-gradient(270deg,#00ffcc,#00d2ff,#7b2cff,#ff00cc,#00ffcc);background-size:400% 400%;animation:t 4s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes t{0%{background-position:0 50%}100%{background-position:100% 50%}}
.marquee{margin-top:8px;width:100%;overflow:hidden;height:36px;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center}
.track{white-space:nowrap;padding-left:100%;font-size:14px;font-weight:900;background:linear-gradient(90deg,#00ffcc,#00d2ff,#7b2cff,#ff00cc,#00ffcc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:r 25s linear infinite}
@keyframes r{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.glass{margin:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}
.title-line{text-align:center;font-size:16px;font-weight:900}
.NHT-live{font-size:12px;color:#00ffcc}
.NHT{margin-top:10px;padding:12px;border-radius:14px;text-align:center;font-weight:800;background:rgba(0,255,200,.08);border:1px solid rgba(0,255,200,.25);cursor:pointer}
.s{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:10px}
.b{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);animation:g 2s infinite}
@keyframes g{0%{box-shadow:0 0 6px rgba(0,255,200,.3)}50%{box-shadow:0 0 18px rgba(0,255,200,.9)}100%{box-shadow:0 0 6px rgba(0,255,200,.3)}}
.b img{width:22px;height:22px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#00ffcc;color:#000;padding:10px 14px;border-radius:12px;font-weight:800;display:none}
</style></head>

<body>
<div class="header">

<div class="s">
<a class="b" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
<a class="b" href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg"></a>
</div>

<div class="logo-wrap"><img class="logo" src="https://i.ibb.co/yn1CnkkD/logo.webp" onload="this.classList.add('loaded')"></div>

<div class="top-name">Ngô Hồng Thái <a class="verify-badge"><svg viewBox="0 0 24 24"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19l12-12-1.5-1.5z"/></svg></a></div>

<div id="info"><span></span></div>
<div class="marquee"><div class="track" id="m"></div></div>

</div>

<!-- IGG -->
<div class="glass">
<div class="title-line">SPEED IGG <span class="NHT-live">28/04/2026 21:21 • <span id="igg">0</span> lượt tải xuống</span></div>
<div class="NHT" onclick="act('igg','https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69f0be9d9a941_IGG2520.ipa',true)">COPY</div>
<div class="NHT" onclick="act('igg','https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69f0be9d9a941_IGG2520.ipa',false)">DOWNLOAD</div>
</div>

<!-- V1 -->
<div class="glass">
<div class="title-line">ĐẾM VÒNG V1 <span class="NHT-live">28/04/2026 21:21 • <span id="v1">0</span> lượt tải xuống</span></div>
<div class="NHT" onclick="act('v1','https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69f0be1a5751e_DV12520.ipa',true)">COPY</div>
<div class="NHT" onclick="act('v1','https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69f0be1a5751e_DV12520.ipa',false)">DOWNLOAD</div>
</div>

<!-- V2 -->
<div class="glass">
<div class="title-line">ĐẾM VÒNG V2 <span class="NHT-live">28/04/2026 21:21 • <span id="v2">0</span> lượt tải xuống</span></div>
<div class="NHT" onclick="act('v2','https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69f0be6d118d0_DV22520.ipa',true)">COPY</div>
<div class="NHT" onclick="act('v2','https://zsign.s3.vn-hcm-1.vietnix.cloud/ipa/69f0be6d118d0_DV22520.ipa',false)">DOWNLOAD</div>
</div>

<div class="toast" id="t"></div>

<script>
let count = JSON.parse(localStorage.getItem("nht_count")) || {igg:0,v1:0,v2:0};

function save(){localStorage.setItem("nht_count",JSON.stringify(count));}

function update(){
document.getElementById("igg").innerText=count.igg;
document.getElementById("v1").innerText=count.v1;
document.getElementById("v2").innerText=count.v2;
}
update();

function act(type,link,isCopy){
count[type]++; // 🔥 COPY + DOWNLOAD đều tính
save();
update();

if(isCopy){
navigator.clipboard.writeText(link);
show("ĐÃ COPY ✅");
}else{
show("ĐANG TẢI...");
setTimeout(()=>window.open(link),600);
}
}

function show(x){
let t=document.getElementById("t");
t.innerText=x;
t.style.display="block";
setTimeout(()=>t.style.display="none",1200);
}

const m=document.getElementById("m"),info=document.getElementById("info");
m.innerText="🔥 NHT SPEED UPDATE LIÊN TỤC ⚡ FREE MIỄN PHÍ 💎 CẦN MUA CHỨNG CHỈ CÀI SPEED LIÊN HỆ ZALO 💬 0349 3333 97 Ngô Hồng Thái";

function time(){
let d=new Date(),a=["Chủ Nhật","Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7"];
info.innerHTML="<span>I AM NHT • "+a[d.getDay()]+" • "+d.toLocaleTimeString()+"</span>"
}
time();setInterval(time,1000);
</script>
</body></html>

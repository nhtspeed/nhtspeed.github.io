/* HEADER */

}

.glow{

filter:blur(8px);

z-index:0;
}

.glow::after{
content:"";
position:absolute;
inset:6px;
background:#111;
border-radius:50%;
}

.logo-wrap::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);
transform:translateX(-120%);
animation:sweep 1.8s infinite;
pointer-events:none;
z-index:2;
}

@keyframes spin{100%{transform:rotate(360deg)}}
